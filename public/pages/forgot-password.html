<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Eventra</title>
    <link rel="stylesheet" href="../css/login-style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container centered-layout">
        <div class="login-left">
            <div class="login-form-container glass-effect" style="border-radius: 24px; padding: 3rem;">
                <header class="login-header" style="margin-bottom: 2.5rem;">
                    <h1 class="login-title" style="font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;">Forgot Password?</h1>
                    <p style="color: #64748b; margin-top: 0.5rem;">Enter your email to receive a reset link.</p>
                </header>

                <form id="forgotPasswordForm" class="login-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" class="form-input" placeholder="m@example.com" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="login-button" style="border-radius: 12px; font-weight: 700; margin-top: 1rem;">Send Reset Link</button>
                    
                    <div style="text-align: center; margin-top: 2rem;">
                        <a href="../../client/pages/clientLogin.html" style="color: #7c3aed; text-decoration: none; font-weight: 600; font-size: 0.9rem;">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Link Sent!',
                        text: result.message,
                        confirmButtonColor: '#7c3aed'
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Oops...',
                        text: result.message,
                        confirmButtonColor: '#7c3aed'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'An unexpected error occurred. Please try again later.',
                    confirmButtonColor: '#7c3aed'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
