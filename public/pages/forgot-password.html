<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Eventra</title>
    <link rel="stylesheet" href="../css/login-style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container centered-layout">
        <div class="login-left">
            <div class="login-form-container glass-effect" style="border-radius: 24px; padding: 3rem;">
                <header class="login-header" style="margin-bottom: 2.5rem;">
                    <h1 class="login-title" style="font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;">Forgot Password?</h1>
                    <p style="color: #64748b; margin-top: 0.5rem;">Enter your email to receive an OTP code.</p>
                </header>

                <form id="forgotPasswordForm" class="login-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Client Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" class="form-input" placeholder="m@example.com" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="login-button" style="border-radius: 12px; font-weight: 700; margin-top: 1rem;">Send OTP</button>
                    
                    <div style="text-align: center; margin-top: 2rem;">
                        <a href="../../client/pages/clientLogin.html" style="color: #2ecc71; text-decoration: none; font-weight: 600; font-size: 0.9rem;">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'OTP Sent!',
                        text: result.message,
                        confirmButtonColor: '#2ecc71'
                    }).then(() => {
                        showPasswordResetOTPModal(email);
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Oops...',
                        text: result.message,
                        confirmButtonColor: '#2ecc71'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'An unexpected error occurred. Please try again later.',
                    confirmButtonColor: '#2ecc71'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send OTP';
            }
        });

        // OTP Modal
        function showPasswordResetOTPModal(email) {
            Swal.fire({
                title: 'Enter OTP Code',
                html: `
                    <div style="text-align: left;">
                        <p style="color: #64748b; margin-bottom: 1rem;">Enter the 6-digit code we sent to your email.</p>
                        <input type="text" id="otpCode" maxlength="6" placeholder="000000" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 1.5rem; letter-spacing: 0.25rem; font-weight: bold;" inputmode="numeric" pattern="[0-9]*">
                    </div>
                `,
                icon: 'question',
                confirmButtonText: 'Verify OTP',
                confirmButtonColor: '#2ecc71',
                allowOutsideClick: false,
                didOpen: () => {
                    document.getElementById('otpCode').focus();
                    document.getElementById('otpCode').addEventListener('keypress', (e) => {
                        if (!/[0-9]/.test(e.key)) e.preventDefault();
                    });
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const otpCode = document.getElementById('otpCode').value;
                    
                    if (!otpCode || otpCode.length !== 6) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Invalid OTP',
                            text: 'Please enter a 6-digit code.',
                            confirmButtonColor: '#2ecc71'
                        });
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/verify-password-reset-otp.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, otp_code: otpCode })
                        });

                        const verifyResult = await response.json();

                        if (verifyResult.success) {
                            showNewPasswordModal(email);
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'Invalid OTP',
                                text: verifyResult.message || 'The OTP code is invalid or expired.',
                                confirmButtonColor: '#2ecc71'
                            }).then(() => {
                                showPasswordResetOTPModal(email);
                            });
                        }
                    } catch (error) {
                        console.error('OTP verification error:', error);
                        Swal.fire({
                            icon: 'error',
                            title: 'Error',
                            text: 'An error occurred while verifying OTP.',
                            confirmButtonColor: '#2ecc71'
                        }).then(() => {
                            showPasswordResetOTPModal(email);
                        });
                    }
                }
            });
        }

        // New Password Modal
        function showNewPasswordModal(email) {
            Swal.fire({
                title: 'Set New Password',
                html: `
                    <div style="text-align: left;">
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; font-weight: 600; color: #1f2937; margin-bottom: 0.5rem; font-size: 0.9rem;">New Password</label>
                            <input type="password" id="newPassword" placeholder="••••••••" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; font-weight: 600; color: #1f2937; margin-bottom: 0.5rem; font-size: 0.9rem;">Confirm Password</label>
                            <input type="password" id="confirmPassword" placeholder="••••••••" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem;">
                        </div>
                    </div>
                `,
                icon: 'question',
                confirmButtonText: 'Update Password',
                confirmButtonColor: '#2ecc71',
                allowOutsideClick: false,
                didOpen: () => {
                    document.getElementById('newPassword').focus();
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (!newPassword || newPassword.length < 8) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Weak Password',
                            text: 'Password must be at least 8 characters long.',
                            confirmButtonColor: '#2ecc71'
                        }).then(() => {
                            showNewPasswordModal(email);
                        });
                        return;
                    }

                    if (newPassword !== confirmPassword) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Passwords Do Not Match',
                            text: 'The passwords you entered do not match.',
                            confirmButtonColor: '#2ecc71'
                        }).then(() => {
                            showNewPasswordModal(email);
                        });
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/reset-password-otp.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password: newPassword })
                        });

                        const resetResult = await response.json();

                        if (resetResult.success) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Success!',
                                text: 'Your password has been reset successfully.',
                                confirmButtonColor: '#2ecc71'
                            }).then(() => {
                                window.location.href = '../../client/pages/clientLogin.html';
                            });
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'Error',
                                text: resetResult.message || 'Failed to reset password.',
                                confirmButtonColor: '#2ecc71'
                            }).then(() => {
                                showNewPasswordModal(email);
                            });
                        }
                    } catch (error) {
                        console.error('Password reset error:', error);
                        Swal.fire({
                            icon: 'error',
                            title: 'Error',
                            text: 'An error occurred while resetting password.',
                            confirmButtonColor: '#2ecc71'
                        }).then(() => {
                            showNewPasswordModal(email);
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
