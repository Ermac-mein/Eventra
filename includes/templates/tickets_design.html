<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket - <?=$event_title?></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            margin: 0;
            size: A4;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .ticket-container {
            width: 100%;
            max-width: 850px;
            background: #fff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            overflow: hidden;
        }

        .ticket {
            width: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Ticket Header */
        .ticket-header {
            padding: 30px;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            border-bottom: 3px solid #d4af37;
            position: relative;
            overflow: hidden;
        }

        .ticket-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .header-left {
            flex: 1;
        }

        .event-label {
            color: #d4af37;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        .event-title {
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            line-height: 1.2;
            word-break: break-word;
        }

        .event-type-badge {
            display: inline-block;
            background: #d4af37;
            color: #1a1a2e;
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .event-type-badge.vip {
            background: #ff6b6b;
            color: #fff;
        }

        .event-type-badge.free {
            background: #51cf66;
            color: #fff;
        }

        .header-right {
            text-align: right;
            min-width: 100px;
        }

        .event-logo {
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 2px;
            color: #d4af37;
            margin-bottom: 10px;
        }

        /* Ticket Main Content */
        .ticket-main {
            display: flex;
            flex: 1;
        }

        .ticket-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #d4af37;
            word-break: break-word;
        }

        .detail-value.white {
            color: #fff;
        }

        .attendee-section {
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 15px;
            margin-top: 15px;
        }

        .attendee-label {
            font-size: 9px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 3px;
            font-weight: 700;
        }

        .attendee-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        /* Ticket Stub (QR Code Section) */
        .ticket-stub {
            width: 280px;
            background: #f5f5f5;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 2px dashed #ddd;
            position: relative;
            text-align: center;
        }

        .stub-header {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .qr-code-wrapper {
            width: 160px;
            height: 160px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .qr-code {
            width: 150px;
            height: 150px;
            display: block;
        }

        .ticket-code {
            font-size: 12px;
            font-weight: 700;
            color: #1a1a2e;
            word-break: break-all;
            line-height: 1.4;
        }

        .scan-instruction {
            font-size: 8px;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        /* Footer */
        .ticket-footer {
            padding: 15px 30px;
            background: #0a0a0a;
            font-size: 9px;
            color: #666;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .ticket {
                flex-direction: column;
            }

            .ticket-main {
                flex-direction: column;
            }

            .ticket-content {
                padding: 20px;
            }

            .ticket-stub {
                width: 100%;
                border-left: none;
                border-top: 2px dashed #ddd;
                padding: 20px;
                margin-top: 20px;
            }

            .details-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .ticket-header {
                padding: 20px;
            }

            .header-content {
                flex-direction: column;
            }

            .event-title {
                font-size: 28px;
            }

            .detail-value {
                font-size: 14px;
            }

            .header-right {
                text-align: left;
            }

            .qr-code-wrapper {
                width: 140px;
                height: 140px;
            }

            .qr-code {
                width: 130px;
                height: 130px;
            }
        }

        @media (max-width: 480px) {
            .ticket-container {
                max-width: 100%;
                border-radius: 8px;
            }

            body {
                padding: 5px;
            }

            .ticket-header {
                padding: 15px;
            }

            .header-content {
                gap: 10px;
            }

            .event-title {
                font-size: 22px;
                margin-bottom: 10px;
            }

            .event-label {
                font-size: 9px;
            }

            .ticket-content {
                padding: 15px;
            }

            .details-grid {
                gap: 10px;
            }

            .detail-label {
                font-size: 8px;
            }

            .detail-value {
                font-size: 12px;
            }

            .attendee-name {
                font-size: 14px;
            }

            .ticket-stub {
                padding: 15px;
            }

            .stub-header {
                font-size: 8px;
            }

            .qr-code-wrapper {
                width: 110px;
                height: 110px;
                margin-bottom: 10px;
            }

            .qr-code {
                width: 100px;
                height: 100px;
            }

            .ticket-code {
                font-size: 10px;
            }

            .ticket-footer {
                padding: 10px 15px;
                font-size: 8px;
            }
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }

            .ticket-container {
                box-shadow: none;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="ticket-container">
        <!-- Ticket Header -->
        <div class="ticket-header">
            <div class="header-content">
                <div class="header-left">
                    <span class="event-label">Event Admission Ticket</span>
                    <h1 class="event-title"><?=$event_title?></h1>
                    <?php if (isset($ticket_type_display) && !empty($ticket_type_display)): ?>
                        <span class="event-type-badge <?=strpos(strtolower($ticket_type_display), 'vip') ? 'vip' : (strpos(strtolower($ticket_type_display), 'free') ? 'free' : '')?>"><?=$ticket_type_display?></span>
                    <?php endif; ?>
                </div>
                <div class="header-right">
                    <div class="event-logo">EVENTRA</div>
                </div>
            </div>
        </div>

        <!-- Ticket Main Content -->
        <div class="ticket-main">
            <div class="ticket-content">
                <!-- Event Details -->
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="detail-label">Date</span>
                        <span class="detail-value white"><?=$date?></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Time</span>
                        <span class="detail-value white"><?=isset($time) ? $time : 'TBC'?></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Venue / Location</span>
                        <span class="detail-value white"><?=$venue?></span>
                    </div>
                    <?php if (isset($state) && !empty($state)): ?>
                    <div class="detail-item">
                        <span class="detail-label">State</span>
                        <span class="detail-value white"><?=$state?></span>
                    </div>
                    <?php endif; ?>
                    <?php if (isset($price) && !empty($price)): ?>
                    <div class="detail-item">
                        <span class="detail-label">Price</span>
                        <span class="detail-value"><?=$price?></span>
                    </div>
                    <?php endif; ?>
                </div>

                <!-- Attendee Information -->
                <div class="attendee-section">
                    <div class="attendee-label">Ticket Holder</div>
                    <div class="attendee-name"><?=isset($user_name) ? $user_name : 'Attendee'?></div>
                </div>
            </div>

            <!-- QR Code Stub -->
            <div class="ticket-stub">
                <div class="stub-header">Scan to Enter</div>
                
                <div class="qr-code-wrapper">
                    <?php if ($qr_base64): ?>
                        <img src="<?=$qr_base64?>" class="qr-code" alt="QR Code">
                    <?php else: ?>
                        <div style="width: 100%; height: 100%; background: #eee; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 12px;">QR Code</div>
                    <?php endif; ?>
                </div>

                <div class="ticket-code"><?=$ticket_id?></div>
                <div class="scan-instruction">Scan QR code at entry</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="ticket-footer">
            This ticket is valid only for the event date and time specified above. Please keep this ticket secure. Non-transferable without event organizer approval.
        </div>
    </div>
</body>
</html>
