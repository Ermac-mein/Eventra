        /* Perforation Effect */
        .ticket-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: repeating-linear-gradient(

                transparent,
                transparent 2px,
                rgba(255,90,95,0.3) 2px,
                rgba(255,90,95,0.3) 4px

        }
        
        .ticket-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 2px,
                rgba(255,90,95,0.3) 2px,
                rgba(255,90,95,0.3) 4px
